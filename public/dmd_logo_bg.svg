<svg width="1200" height="1200" viewBox="0 0 1200 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgCore" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 560) rotate(90) scale(620)">
      <stop offset="0%" stop-color="#16202A"/>
      <stop offset="48%" stop-color="#0B0F14"/>
      <stop offset="100%" stop-color="#05070B"/>
    </radialGradient>

    <linearGradient id="goldMain" x1="260" y1="220" x2="940" y2="980" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFF6CF"/>
      <stop offset="20%" stop-color="#F7DD7C"/>
      <stop offset="48%" stop-color="#F5C542"/>
      <stop offset="76%" stop-color="#C8921E"/>
      <stop offset="100%" stop-color="#FFE3A0"/>
    </linearGradient>

    <linearGradient id="goldSoft" x1="320" y1="300" x2="880" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F3DE9A"/>
      <stop offset="55%" stop-color="#CC9D2B"/>
      <stop offset="100%" stop-color="#7D5A13"/>
    </linearGradient>

    <filter id="ringGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feColorMatrix
        in="blur"
        type="matrix"
        values="1 0 0 0 0
                0 0.78 0 0 0
                0 0 0.28 0 0
                0 0 0 0.24 0"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1200" rx="260" fill="url(#bgCore)"/>

  <!-- Ambient center glow -->
  <ellipse cx="600" cy="560" rx="300" ry="280" fill="#D4A72C" opacity="0.06" filter="url(#ringGlow)"/>

  <!-- Elite frame -->
  <circle cx="600" cy="600" r="372" stroke="url(#goldMain)" stroke-width="16"/>
  <circle cx="600" cy="600" r="340" stroke="url(#goldSoft)" stroke-opacity="0.30" stroke-width="2"/>
  <circle cx="600" cy="600" r="312" stroke="url(#goldSoft)" stroke-opacity="0.14" stroke-width="2"/>

  <!-- Cardinal accents -->
  <circle cx="600" cy="228" r="8" fill="#F5C542"/>
  <circle cx="972" cy="600" r="8" fill="#F5C542"/>
  <circle cx="600" cy="972" r="8" fill="#F5C542"/>
  <circle cx="228" cy="600" r="8" fill="#F5C542"/>

  <!-- Top line -->
  <text
    x="600"
    y="320"
    text-anchor="middle"
    fill="url(#goldSoft)"
    font-family="Inter, Arial, sans-serif"
    font-size="24"
    font-weight="700"
    letter-spacing="8"
    opacity="0.9">ELITE DIGITAL ASSET</text>

  <!-- Main wordmark: SHARP / NO BLUR -->
  <text
    x="600"
    y="510"
    text-anchor="middle"
    fill="url(#goldMain)"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="96"
    font-weight="700"
    letter-spacing="4">DIE MARK</text>

  <text
    x="600"
    y="635"
    text-anchor="middle"
    fill="url(#goldMain)"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="122"
    font-weight="800"
    letter-spacing="6">DIGITAL</text>

  <!-- Divider -->
  <rect x="405" y="690" width="390" height="3" rx="999" fill="url(#goldMain)" opacity="0.9"/>

  <!-- Center signature -->
  <text
    x="600"
    y="760"
    text-anchor="middle"
    fill="#F3CF6A"
    font-family="Inter, Arial, sans-serif"
    font-size="34"
    font-weight="800"
    letter-spacing="10">DMD</text>

  <text
    x="600"
    y="815"
    text-anchor="middle"
    fill="#C6A45D"
    font-family="Inter, Arial, sans-serif"
    font-size="18"
    font-weight="700"
    letter-spacing="5"
    opacity="0.84">PREMIUM TRADING PLATFORM</text>

  <!-- Subtle inner frame -->
  <rect x="332" y="378" width="536" height="465" rx="24" stroke="url(#goldSoft)" stroke-opacity="0.12" stroke-width="2"/>

  <!-- Minimal accent lines -->
  <line x1="600" y1="390" x2="600" y2="442" stroke="url(#goldSoft)" stroke-opacity="0.16" stroke-width="2"/>
  <line x1="600" y1="846" x2="600" y2="898" stroke="url(#goldSoft)" stroke-opacity="0.16" stroke-width="2"/>
</svg>