<svg width="1200" height="1200" viewBox="0 0 1200 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Tiefes Background -->
    <radialGradient id="bgCore" cx="50%" cy="46.7%" r="51.7%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#16202A"/>
      <stop offset="48%" stop-color="#0B0F14"/>
      <stop offset="100%" stop-color="#05070B"/>
    </radialGradient>

    <!-- Ultra-Shiny Gold Metall (neuer starker Glanz) -->
    <linearGradient id="goldShiny" x1="240" y1="180" x2="960" y2="1020" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFDF0"/>
      <stop offset="12%" stop-color="#FFEF9E"/>
      <stop offset="28%" stop-color="#F5C542"/>
      <stop offset="48%" stop-color="#E8B530"/>
      <stop offset="65%" stop-color="#C8921E"/>
      <stop offset="82%" stop-color="#FFE8B5"/>
      <stop offset="100%" stop-color="#FFF9D8"/>
    </linearGradient>

    <!-- Metall-Highlight (für Reflexion) -->
    <linearGradient id="goldHighlight" x1="380" y1="320" x2="820" y2="880" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.65"/>
      <stop offset="35%" stop-color="#F5C542" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#C8921E" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.08"/>
    </linearGradient>

    <!-- Soft Unterton -->
    <linearGradient id="goldSoft" x1="320" y1="280" x2="880" y2="920" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F3E0A8"/>
      <stop offset="55%" stop-color="#D4A72C"/>
      <stop offset="100%" stop-color="#7D5A13"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1200" rx="260" fill="url(#bgCore)"/>

  <!-- Elite Metall Ring (stark glänzend) -->
  <circle cx="600" cy="600" r="372" stroke="url(#goldShiny)" stroke-width="19"/>
  <circle cx="600" cy="600" r="340" stroke="url(#goldSoft)" stroke-opacity="0.38" stroke-width="4"/>
  <circle cx="600" cy="600" r="312" stroke="url(#goldSoft)" stroke-opacity="0.18" stroke-width="2"/>

  <!-- Highlight-Overlay für echten Metall-Glanz -->
  <circle cx="600" cy="600" r="372" stroke="url(#goldHighlight)" stroke-width="12" opacity="0.75"/>

  <!-- Cardinal Accents (metallisch glänzend) -->
  <circle cx="600" cy="228" r="10" fill="#F5C542"/>
  <circle cx="972" cy="600" r="10" fill="#F5C542"/>
  <circle cx="600" cy="972" r="10" fill="#F5C542"/>
  <circle cx="228" cy="600" r="10" fill="#F5C542"/>

  <!-- Top Line -->
  <text x="600" y="320" text-anchor="middle" fill="#F5C542" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="8.5" opacity="0.95">ELITE DIGITAL ASSET</text>

  <!-- Main Wordmark – scharf & metallisch -->
  <text x="600" y="510" text-anchor="middle" fill="url(#goldShiny)" font-family="Georgia, 'Times New Roman', serif" font-size="96" font-weight="700" letter-spacing="4">DIE MARK</text>
  <text x="600" y="635" text-anchor="middle" fill="url(#goldShiny)" font-family="Georgia, 'Times New Roman', serif" font-size="122" font-weight="800" letter-spacing="6.2">DIGITAL</text>

  <!-- Divider -->
  <rect x="405" y="690" width="390" height="3" rx="999" fill="url(#goldShiny)" opacity="0.95"/>

  <!-- Center Signature -->
  <text x="600" y="760" text-anchor="middle" fill="#F3CF6A" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" letter-spacing="10">DMD</text>
  <text x="600" y="815" text-anchor="middle" fill="#C6A45D" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="5" opacity="0.88">PREMIUM TRADING PLATFORM</text>

  <!-- Inner Frame -->
  <rect x="332" y="378" width="536" height="465" rx="24" stroke="url(#goldSoft)" stroke-opacity="0.18" stroke-width="2"/>
  
  <!-- Minimal Accents -->
  <line x1="600" y1="390" x2="600" y2="442" stroke="#F5C542" stroke-opacity="0.22" stroke-width="2"/>
  <line x1="600" y1="846" x2="600" y2="898" stroke="#F5C542" stroke-opacity="0.22" stroke-width="2"/>
</svg>